<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harian Keuangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-start p-6">

    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
        
        <div class="w-full md:w-64 bg-slate-900 text-white p-6 flex flex-col justify-between border-r border-slate-800">
            <div>
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-blue-600 p-2 rounded-xl text-white">
                        <i data-lucide="wallet" class="w-6 h-6"></i>
                    </div>
                    <h2 class="text-xl font-bold tracking-wide">RAMZ-FIN</h2>
                </div>

                <div class="bg-slate-800/50 border border-slate-700/50 rounded-2xl p-4 mb-4">
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Sisa Saldo Anda</p>
                    <h3 id="saldo-total" class="text-2xl font-black text-blue-4xl text-blue-4xl">Rp 0</h3>
                </div>
            </div>

            <button onclick="logout()" class="w-full mt-6 bg-slate-800 hover:bg-red-900/40 border border-slate-700 hover:border-red-800/50 text-slate-300 hover:text-red-200 py-3 px-4 rounded-xl font-medium transition-all flex items-center justify-center gap-2 cursor-pointer">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                Keluar Aplikasi
            </button>
        </div>

        <div class="flex-1 p-6 md:p-8 flex flex-col gap-6 overflow-y-auto">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-100 pb-4">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 flex items-center gap-2">
                        💰 Harian Keuangan: <span id="nama-user" class="text-blue-600">User</span>
                    </h1>
                    <p class="text-sm text-slate-500 mt-1">Catat keuangan pribadi Anda langsung ke cloud.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex items-center gap-4">
                    <div class="bg-emerald-500 p-3 rounded-xl text-white shadow-md shadow-emerald-200">
                        <i data-lucide="arrow-down-left" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 font-semibold uppercase">Total Pemasukan</p>
                        <h4 id="total-masuk" class="text-xl font-bold text-emerald-700">Rp 0</h4>
                    </div>
                </div>
                <div class="bg-rose-50 border border-rose-100 rounded-2xl p-4 flex items-center gap-4">
                    <div class="bg-rose-500 p-3 rounded-xl text-white shadow-md shadow-rose-200">
                        <i data-lucide="arrow-up-right" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 font-semibold uppercase">Total Pengeluaran</p>
                        <h4 id="total-keluar" class="text-xl font-bold text-rose-700">Rp 0</h4>
                    </div>
                </div>
            </div>

            <div class="bg-slate-50/50 border border-slate-200/60 rounded-2xl p-5 flex flex-col gap-4">
                <h3 class="font-bold text-slate-900 flex items-center gap-2 text-base">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i> Tambah Catatan Baru
                </h3>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Jenis Transaksi</label>
                        <div class="flex gap-4 bg-white border border-slate-200 p-2.5 rounded-xl justify-around">
                            <label class="flex items-center gap-2 text-sm font-medium text-slate-7xl cursor-pointer">
                                <input type="radio" name="jenis" value="Pengeluaran" checked class="w-4 h-4 text-blue-600"> 📉 Pengeluaran
                            </label>
                            <label class="flex items-center gap-2 text-sm font-medium text-slate-7xl cursor-pointer">
                                <input type="radio" name="jenis" value="Pemasukan" class="w-4 h-4 text-blue-600"> 📈 Pemasukan
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Pilih Tanggal</label>
                        <input type="date" id="input-tanggal" class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-sm font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Harga / Nominal (Rp)</label>
                        <input type="number" id="input-harga" placeholder="Contoh: 50000" class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-sm font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase mb-1.5">Nama Barang / Sumber Dana</label>
                        <input type="text" id="input-barang" placeholder="Contoh: Bensin, Uang Saku" class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-sm font-medium shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <button onclick="simpanTransaksi()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 hover:shadow-none transition-all duration-200 cursor-pointer text-sm">
                    Simpan Transaksi
                </button>
            </div>

            <div class="flex flex-col gap-3">
                <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                    <h3 class="font-bold text-slate-900 flex items-center gap-2 text-base">
                        <i data-lucide="history" class="w-5 h-5 text-slate-500"></i> Riwayat & Kelola Keuangan
                    </h3>
                    <button onclick="downloadCSV()" class="text-xs bg-slate-100 border border-slate-200 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-semibold transition-all cursor-pointer flex items-center gap-1">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Simpan Excel (.csv)
                    </button>
                </div>
                
                <div id="status-cloud" class="hidden text-center py-4 text-sm font-medium"></div>

                <div id="list-transaksi" class="flex flex-col gap-2 max-h-[300px] overflow-y-auto pr-1">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // ==================== CONFIGURATION URL ====================
        const API_URL = "https://script.google.com/macros/s/AKfycbxj9I5O9Dnlf-s_W94f-Oe910tOUBu11wgUy2Fj_x_0sDJfLLQCTol_EGUtk4qJI0Gdbg/exec";
        // ===========================================================

        let currentUser = localStorage.getItem("keuangan_user") || "Rama";
        let daftarTransaksi = [];

        // Inisialisasi Halaman Utama
        document.getElementById("nama-user").innerText = currentUser.toUpperCase();
        document.getElementById("input-tanggal").valueAsDate = new Date();
        lucide.createIcons();
        muatDataDariCloud();

        // Ambil Data dari Spreadsheet Cloud via GET
        async function muatDataDariCloud() {
            const statusDiv = document.getElementById("status-cloud");
            statusDiv.className = "text-center py-4 text-sm font-medium text-blue-600 flex items-center justify-center gap-2";
            statusDiv.innerHTML = `<span class="animate-spin rounded-full h-4 w-4 border-2 border-blue-600 border-t-transparent"></span> Memuat database cloud...`;
            statusDiv.classList.remove("hidden");

            try {
                const respon = await fetch(`${API_URL}?sheetName=Pengeluaran`);
                if (!respon.ok) throw new Error("Gagal mengambil respon server");
                
                const dataMentah = await respon.json();
                
                // Filter data milik user aktif saat ini
                daftarTransaksi = dataMentah.filter(item => String(item.Username).toLowerCase() === currentUser.toLowerCase());
                
                statusDiv.classList.add("hidden");
                renderAplikasi();
            } catch (err) {
                console.error(err);
                statusDiv.className = "text-center py-4 text-sm font-medium text-rose-600 flex items-center justify-center gap-2";
                statusDiv.innerHTML = `❌ Gagal memuat data dari cloud spreadsheet database.`;
            }
        }

        // Render Antarmuka Tampilan Data & Perhitungan Saldo
        function renderAplikasi() {
            const container = document.getElementById("list-transaksi");
            container.innerHTML = "";

            let totalMasuk = 0;
            let totalKeluar = 0;

            if (daftarTransaksi.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 py-6 text-sm italic font-medium">Belum ada riwayat transaksi akun Anda di cloud.</p>`;
            } else {
                // Urutkan transaksi berdasarkan tanggal terbaru di atas
                daftarTransaksi.sort((a, b) => new Date(b.Tanggal) - new Date(a.Tanggal));

                daftarTransaksi.forEach(item => {
                    const nominal = parseInt(item["Harga (Rp)"]) || 0;
                    const jenis = item.Jenis;

                    if (jenis === "Pemasukan") totalMasuk += nominal;
                    else totalKeluar += nominal;

                    const row = document.createElement("div");
                    row.className = "flex items-center justify-between bg-white border border-slate-100 p-3 rounded-xl hover:border-slate-200 transition-all shadow-sm";
                    
                    const isMasuk = jenis === "Pemasukan";
                    const iconColor = isMasuk ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-700";
                    const iconName = isMasuk ? "arrow-down-left" : "arrow-up-right";
                    const textPriceColor = isMasuk ? "text-emerald-700" : "text-rose-700";
                    const labelSign = isMasuk ? "+" : "-";

                    row.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="${iconColor} p-2 rounded-lg">
                                <i data-lucide="${iconName}" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <h5 class="font-bold text-slate-900 text-sm">${item["Nama Barang / Kebutuhan"]}</h5>
                                <p class="text-xs text-slate-400 font-medium">${formatTanggalIndo(item.Tanggal)}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-extrabold text-sm ${textPriceColor}">${labelSign} Rp ${nominal.toLocaleString('id-ID')}</span>
                            <button onclick="hapusTransaksi('${item.ID_Transaksi}')" class="text-slate-300 hover:text-rose-600 p-1 rounded-lg hover:bg-rose-50 transition-all cursor-pointer">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }

            // Hitung sisa saldo akhir
            const sisaSaldo = totalMasuk - totalKeluar;

            document.getElementById("total-masuk").innerText = `Rp ${totalMasuk.toLocaleString('id-ID')}`;
            document.getElementById("total-keluar").innerText = `Rp ${totalKeluar.toLocaleString('id-ID')}`;
            
            const saldoEl = document.getElementById("saldo-total");
            saldoEl.innerText = `Rp ${sisaSaldo.toLocaleString('id-ID')}`;
            if (sisaSaldo < 0) {
                saldoEl.className = "text-2xl font-black text-rose-500";
            } else {
                saldoEl.className = "text-2xl font-black text-blue-4xl text-blue-4xl";
            }

            lucide.createIcons();
        }

        // Simpan Transaksi Baru via POST ke Cloud
        async function simpanTransaksi() {
            const jenis = document.querySelector('input[name="jenis"]:checked').value;
            const tglVal = document.getElementById("input-tanggal").value;
            const harga = parseInt(document.getElementById("input-harga").value);
            const barang = document.getElementById("input-barang").value.trim();

            if (!tglVal) return alert("Pilih tanggal transaksi terlebih dahulu!");
            if (!harga || harga <= 0) return alert("Nominal transaksi harus lebih besar dari Rp 0!");
            if (!barang) return alert("Isi nama kebutuhan atau sumber dana!");

            const tglObj = new Date(tglVal);
            const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"][tglObj.getDay()];
            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][tglObj.getMonth()];
            const txId = "TX-" + Date.now() + Math.floor(Math.random() * 1000);

            // Format array data baris sesuai kolom spreadsheet
            const dataBaris = [
                currentUser,  // A: Username
                namaHari,     // B: Hari
                tglVal,       // C: Tanggal (YYYY-MM-DD)
                namaBulan,    // D: Bulan
                barang,       // E: Nama Barang / Kebutuhan
                harga,        // F: Harga (Rp)
                jenis,        // G: Jenis (Pemasukan/Pengeluaran)
                txId          // H: ID_Transaksi
            ];

            const payload = {
                sheetName: "Pengeluaran",
                action: "INSERT",
                rowData: dataBaris
            };

            try {
                const respon = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const hasil = await respon.json();

                if (hasil.status === "SUCCESS") {
                    // Kosongkan form input
                    document.getElementById("input-harga").value = "";
                    document.getElementById("input-barang").value = "";
                    
                    // Refresh data
                    muatDataDariCloud();
                } else {
                    alert("Gagal menyimpan data transaksi ke cloud: " + hasil.message);
                }
            } catch (err) {
                console.error(err);
                alert("Gagal mengirim data transaksi ke cloud.");
            }
        }

        // Hapus Transaksi Berdasarkan ID_Transaksi via POST ke Cloud
        async function hapusTransaksi(txId) {
            if (!confirm("Apakah Anda yakin ingin menghapus catatan transaksi ini?")) return;

            const payload = {
                sheetName: "Pengeluaran",
                action: "DELETE",
                transactionId: txId
            };

            try {
                const respon = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const hasil = await respon.json();

                if (hasil.status === "SUCCESS") {
                    muatDataDariCloud();
                } else {
                    alert("Gagal menghapus data di cloud: " + hasil.message);
                }
            } catch (err) {
                console.error(err);
                alert("Terjadi gangguan koneksi saat menghapus data.");
            }
        }

        // Format Tanggal Internasional ke Indonesia Terbaca
        function formatTanggalIndo(tglStr) {
            if (!tglStr) return "";
            const ops = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(tglStr).toLocaleDateString('id-ID', ops);
        }

        // Cetak Unduh Laporan format CSV Offline
        function downloadCSV() {
            if(daftarTransaksi.length === 0) return alert("Tidak ada data transaksi untuk diekspor!");
            let barisCsv = "Username,Hari,Tanggal,Bulan,Nama Barang / Kebutuhan,Harga (Rp),Jenis,ID_Transaksi\n";
            
            daftarTransaksi.forEach(item => {
                barisCsv += `"${item.Username}","${item.Hari}","${item.Tanggal}","${item.Bulan}","${item["Nama Barang / Kebutuhan"]}",${item["Harga (Rp)"]},"${item.Jenis}","${item.ID_Transaksi}"\n`;
            });

            const blob = new Blob([barisCsv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Laporan_Keuangan_${currentUser}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Log out Aplikasi Balik
        function logout() {
            localStorage.removeItem("keuangan_user");
            alert("Berhasil keluar dari sesi akun.");
            location.reload(); 
        }
    </script>
</body>
</html>
